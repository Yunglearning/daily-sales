<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede5;
  --card:#ffffff;
  --card2:#e8e4da;
  --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.12);
  --ink:#141008;
  --ink2:#6b5f4a;
  --ink3:#a89880;
  --gold:#8a6c18;
  --gold2:#c49a22;
  --goldbg:rgba(138,108,24,0.09);
  --green:#145228;
  --greenbg:#d1fae5;
  --amber:#7c3d0c;
  --amberbg:#fef3c7;
  --red:#8b1a1a;
  --redbg:#fee2e2;
  --r:16px;
  --rs:10px;
}
html,body{min-height:100%;background:var(--bg);}
body{font-family:'Geist',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}

/* ── TOPBAR ── */
.topbar{
  background:var(--ink);
  padding:20px 18px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-left{}
.t-eyebrow{
  font-size:9px;font-weight:400;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(240,237,229,0.35);
  margin-bottom:5px;
}
.t-title{
  font-family:'Fraunces',serif;
  font-size:26px;font-weight:600;
  color:#f0ede5;line-height:1;
}
.t-title em{font-style:italic;font-weight:400;color:#d4a83a;}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.t-meta{font-size:11px;font-weight:300;color:rgba(240,237,229,0.38);text-align:right;line-height:1.4;}
.t-refresh{
  display:flex;align-items:center;gap:5px;
  background:none;border:1px solid rgba(255,255,255,0.15);
  border-radius:99px;padding:6px 14px;
  font-family:'Geist',sans-serif;font-size:11px;font-weight:400;
  color:rgba(240,237,229,0.6);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.15s;
}
.t-refresh:active{background:rgba(255,255,255,0.08);}
.t-refresh svg{width:12px;height:12px;flex-shrink:0;}

/* ── BODY ── */
.pg{padding:16px 14px 60px;max-width:480px;margin:0 auto;}

/* ── SUMMARY STRIP ── */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.sc{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 12px 12px;
}
.sc-lbl{
  font-size:9px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink3);margin-bottom:7px;
}
.sc-val{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:600;
  color:var(--ink);line-height:1;letter-spacing:-0.3px;
}
.sc-rm{
  font-family:'Geist',sans-serif;
  font-size:10px;font-weight:300;
  color:var(--ink3);margin-right:1px;
  vertical-align:baseline;
}
.sc-sub{font-size:10px;font-weight:300;color:var(--ink2);margin-top:5px;line-height:1.3;}

/* ── SECTION LABEL ── */
.sec{
  font-size:9px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink3);
  margin:22px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border2);}

/* ── OUTLET CARD ── */
.oc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:0;
  margin-bottom:10px;
  overflow:hidden;
  animation:up 0.35s ease both;
}
.oc-head{
  padding:14px 16px 12px;
  display:flex;align-items:flex-start;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.oc-name{
  font-family:'Fraunces',serif;
  font-size:17px;font-weight:600;
  color:var(--ink);line-height:1.1;
}
.oc-rank{font-size:11px;font-weight:300;color:var(--ink3);margin-top:3px;}
.badge{
  font-size:10px;font-weight:500;
  padding:4px 10px;border-radius:99px;
  white-space:nowrap;flex-shrink:0;margin-left:10px;margin-top:1px;
}
.b-ok  {background:var(--greenbg);color:var(--green);}
.b-warn{background:var(--amberbg);color:var(--amber);}
.b-miss{background:var(--redbg);  color:var(--red);}

/* 2-col stats grid inside card */
.oc-body{padding:12px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.st{display:flex;flex-direction:column;gap:4px;}
.st-lbl{font-size:10px;font-weight:400;color:var(--ink3);}
.st-val{
  font-family:'Fraunces',serif;
  font-size:16px;font-weight:600;
  color:var(--ink);line-height:1;
}
.st-val.hi{color:var(--gold);}
.st-val.dim{font-size:14px;font-weight:300;color:var(--ink3);}

/* accent bar */
.oc-bar{height:3px;background:var(--card2);}
.oc-bar-fill{height:100%;background:var(--gold2);transition:width 0.7s cubic-bezier(.4,0,.2,1);}

/* ── TODAY GRID ── */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tp{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 12px;
  display:flex;align-items:center;gap:10px;
}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dok{background:#22c55e;}
.dmiss{background:#ef4444;}
.ti{flex:1;min-width:0;}
.ti-name{
  font-size:12px;font-weight:500;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
}
.ti-amt{font-size:11px;font-weight:300;color:var(--ink2);margin-top:2px;}

/* ── STATES ── */
.ss{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;padding:40px 20px;text-align:center;}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
.sl{font-size:14px;font-weight:300;color:var(--ink2);}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="t-eyebrow">Outlet Performance</div>
    <div class="t-title">Sales <em>Dashboard</em></div>
  </div>
  <div class="topbar-right">
    <div class="t-meta" id="meta">Loading...</div>
    <button class="t-refresh" onclick="loadData()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M13.5 8A5.5 5.5 0 112.5 5.5"/>
        <path d="M2.5 2.5v3h3"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="pg" id="pg">
  <div class="ss"><div class="spin"></div><div class="sl">Loading sales data…</div></div>
</div>

<script>
const OUTLETS=['Sandakan Prima','Sandakan Megah','Lahad Datu Nipah','Lahad Datu Perdana','Tawau','Tawau Bintang','Semporna'];
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSD586DnPC8D-SZZak14UKV7n8SPqosA5mi16PzSS3RLo12ZaDuCIGIhHNgvS6VqwfjsSJZrT9HM8My/pub?gid=0&single=true&output=csv';

async function loadData(){
  document.getElementById('pg').innerHTML='<div class="ss"><div class="spin"></div><div class="sl">Loading…</div></div>';
  try{
    const r=await fetch(CSV+'&t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text=await r.text();
    const lines=text.trim().split('\n');
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const c=splitCSV(lines[i]);
      if(c.length<4) continue;
      const dRaw=(c[1]||'').trim();
      const outlet=(c[2]||'').trim();
      const sales=parseFloat((c[3]||'').replace(/[^0-9.]/g,''))||0;
      if(!outlet||!dRaw) continue;
      rows.push({date:normDate(dRaw),outlet,sales});
    }
    if(!rows.length){
      document.getElementById('pg').innerHTML='<div class="ss"><div class="sl">No data in sheet.</div></div>';
      return;
    }
    render(rows);
  }catch(e){
    document.getElementById('pg').innerHTML=`<div class="ss"><div class="sl">Error: ${e.message}</div><button onclick="loadData()" style="margin-top:10px;padding:8px 20px;border:1px solid var(--border2);border-radius:99px;background:var(--card);font-family:inherit;font-size:13px;cursor:pointer;">Retry</button></div>`;
  }
}

function splitCSV(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){q=!q;}
    else if(ch===','&&!q){r.push(c);c='';}
    else c+=ch;
  }
  r.push(c);return r;
}

function normDate(raw){
  if(/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(raw)){
    const p=raw.split('/');
    return p[2].slice(0,4)+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  }
  if(/^\d{1,2}-\d{1,2}-\d{4}/.test(raw)){
    const p=raw.split('-');
    return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  }
  const d=new Date(raw);
  return isNaN(d)?raw:d.toISOString().slice(0,10);
}

function render(rows){
  const now=new Date();
  const my=new Date(now.getTime()+8*3600000);
  const td=my.toISOString().slice(0,10);
  const mo=td.slice(0,7);
  const yr=td.slice(0,4);

  const TM={},MM={},YM={},MC={};
  OUTLETS.forEach(o=>{TM[o]=0;MM[o]=0;YM[o]=0;MC[o]=0;});

  rows.forEach(r=>{
    if(!OUTLETS.includes(r.outlet)) return;
    const d=r.date,m=d.slice(0,7),y=d.slice(0,4);
    if(d===td)  TM[r.outlet]+=r.sales;
    if(m===mo){ MM[r.outlet]+=r.sales; MC[r.outlet]++; }
    if(y===yr)  YM[r.outlet]+=r.sales;
  });

  const ttl=v=>Object.values(v).reduce((a,b)=>a+b,0);
  const todayT=ttl(TM), monthT=ttl(MM), yearT=ttl(YM);
  const avgM=monthT/OUTLETS.length;
  const maxM=Math.max(...Object.values(MM),1);
  const ranked=[...OUTLETS].sort((a,b)=>MM[b]-MM[a]);
  const subToday=OUTLETS.filter(o=>TM[o]>0).length;

  document.getElementById('meta').innerHTML=
    now.toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})+'<br>'+
    now.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});

  // ── SUMMARY ──
  let h=`<div class="summary">
    <div class="sc">
      <div class="sc-lbl">Today</div>
      <div class="sc-val"><span class="sc-rm">RM</span>${fmt(todayT)}</div>
      <div class="sc-sub">${subToday}/${OUTLETS.length} outlets</div>
    </div>
    <div class="sc">
      <div class="sc-lbl">This month</div>
      <div class="sc-val"><span class="sc-rm">RM</span>${fmt(monthT)}</div>
      <div class="sc-sub">${my.toLocaleDateString('en-MY',{month:'short',year:'numeric'})}</div>
    </div>
    <div class="sc">
      <div class="sc-lbl">This year</div>
      <div class="sc-val"><span class="sc-rm">RM</span>${fmt(yearT)}</div>
      <div class="sc-sub">${yr}</div>
    </div>
  </div>`;

  // ── OUTLET CARDS ──
  h+=`<div class="sec">By outlet</div>`;
  ranked.forEach((o,i)=>{
    const t=TM[o],m=MM[o],y=YM[o],c=MC[o];
    const avg=c>0?m/c:0;
    const pct=Math.round((m/maxM)*100);
    let bc,bl,bcolor;
    if(t===0){bc='b-miss';bl='No report';bcolor='#ef4444';}
    else if(m<avgM*0.7){bc='b-warn';bl='Below avg';bcolor='#f59e0b';}
    else{bc='b-ok';bl='On track';bcolor='#22c55e';}

    h+=`<div class="oc" style="animation-delay:${i*0.04}s">
      <div class="oc-bar"><div class="oc-bar-fill" style="width:${pct}%"></div></div>
      <div class="oc-head">
        <div>
          <div class="oc-name">${o}</div>
          <div class="oc-rank">#${i+1} this month</div>
        </div>
        <span class="badge ${bc}">${bl}</span>
      </div>
      <div class="oc-body">
        <div class="st">
          <div class="st-lbl">Today</div>
          <div class="st-val ${t>0?'hi':'dim'}">${t>0?'RM '+fmt(t):'—'}</div>
        </div>
        <div class="st">
          <div class="st-lbl">This month</div>
          <div class="st-val">RM ${fmt(m)}</div>
        </div>
        <div class="st">
          <div class="st-lbl">This year</div>
          <div class="st-val">RM ${fmt(y)}</div>
        </div>
        <div class="st">
          <div class="st-lbl">Avg / day</div>
          <div class="st-val">RM ${fmt(avg)}</div>
        </div>
      </div>
    </div>`;
  });

  // ── TODAY STATUS ──
  h+=`<div class="sec">Today's submissions</div><div class="tg">`;
  OUTLETS.forEach(o=>{
    const ok=TM[o]>0;
    h+=`<div class="tp">
      <div class="tdot ${ok?'dok':'dmiss'}"></div>
      <div class="ti">
        <div class="ti-name">${o}</div>
        <div class="ti-amt">${ok?'RM '+fmt(TM[o]):'Not submitted'}</div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  document.getElementById('pg').innerHTML=h;
}

function fmt(n){
  if(n>=1000000) return (n/1000000).toFixed(2)+'M';
  if(n>=1000)    return (n/1000).toFixed(1)+'k';
  return Number(n).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
}

loadData();
</script>
</body>
</html>
